<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation pour Cannelle </title>

<style>
body{
    margin:0;
    background:#e8d7c3;
    font-family: 'Georgia', serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:350px;
    background:#f2e4d4;
    padding:20px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.photo{
    width:100%;
    border-radius:15px;
}

h1{
    font-size:38px;
    margin:20px 0 5px;
    color:#5c4333;
}

p{
    font-size:22px;
    color:#6d5240;
}

button{
    margin-top:20px;
    background:#7c9b6d;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <img src="images/Image3.jpg" class="photo">

    <h1>Invitation</h1>

    <p>De la part de : Rémi Augé </p>
    <p>Pour : ⭐ Cannelle ⭐ </p>

    <button onclick="window.location.href='invitation.html'">
        Ouvrir la lettre
    </button>
</div>

</body>
</html>
