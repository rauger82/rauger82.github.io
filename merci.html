<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    background:#e9d9c7;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:360px;
    border-radius:25px;
    overflow:hidden;
    position:relative;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:30px;
    box-sizing:border-box;
}

.text{
    font-size:32px;
    line-height:1.4;
    text-shadow:2px 2px 10px rgba(0,0,0,0.5);
}

button{
    align-self:center;
    background:#7d9b6c;
    border:none;
    padding:15px 35px;
    color:white;
    border-radius:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">

    <img src="images/Image9.jpg">
    <div class="overlay">

        <div class="text">
            Ohh vraiment ?! ❤️<br>
            Je ne pensais pas que vous accepteriez !
        </div>

        <button onclick="window.location.href='organisation.html'">
            CONTINUER
        </button>

    </div>

</div>

</body>
</html>
