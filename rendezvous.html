<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation pour Cannelle</title>

<style>
body{
    margin:0;
    background:#e8d7c3;
    font-family: 'Georgia', serif;
}

/* CONTAINER UNIQUE */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    text-align:center;
}

/* IMAGE PRINCIPALE */
.botomimage{
    height:130px;
    width:120px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* TEXTE */
h1, h2{
    color:#5c4333;
}

p{
    font-size:18px;
    color:#6d5240;
}

/* BOUTON */
button{
    margin-top:20px;
    background:#7c9b6d;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
}

/* IMAGE BAS */
.bottom-img{
    position:absolute;
    bottom:10px;
    right:10px;
    width:40px;
    height:40px;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="container">
    <img src="images/Image7.jpg" class="photo">
    <div id="result"></div>
</div>

<script>
window.onload = function() {

    const date = localStorage.getItem("date");
    const activite = localStorage.getItem("activite");

    // --- ENVOI DES RÉSULTATS PAR MAIL ---
    if (date && activite) {
        fetch("https://formspree.io/f/xkoldvab", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({
                "Date choisie": date,
                "Activité choisie": activite
            })
        })
        .then(response => console.log("Données envoyées avec succès !"))
        .catch(error => console.error("Erreur lors de l'envoi :", error));
    }
    // ------------------------------------------------

    const container = document.querySelector(".container");

    container.style.opacity = 0;
    container.style.transform = "translateY(20px)";

    setTimeout(() => {

        container.style.transition = "1s";
        container.style.opacity = 1;
        container.style.transform = "translateY(0px)";

        container.innerHTML = `
            <h2>❤️ Notre rendez-vous est confirmé</h2>

            <p>📅 <strong>Date :</strong> ${date ? date : "Non définie"}</p>

            <p>🎯 <strong>Activité :</strong> ${activite ? activite : "Non définie"}</p>

            <p style="margin-top:20px;">
                Déjà hâte !
            </p>

            <button onclick="window.location.href='https://www.instagram.com/_rauger_/'">
                Refermer la lettre
            </button>

            <div style="font-size:40px; margin-top:20px;">
                ❤️
            </div>
            <img src="images/Image13.jpg" class="botomimage">
        `;

    }, 500);
};
</script>

</body>
</html>
